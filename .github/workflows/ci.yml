name: Build, Push & GitOps Update

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: sumonaust/python-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout application repo
      # -----------------------------
      - name: Checkout Application Repo
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Set short SHA
      # -----------------------------
      - name: Set image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # -----------------------------
      # 3. Login Docker Hub
      # -----------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------
      # 4. Build image
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$SHORT_SHA .

      # -----------------------------
      # 5. Push image
      # -----------------------------
      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:$SHORT_SHA

      # -----------------------------
      # 6. Checkout GitOps repo
      # -----------------------------
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: sumonaust/python-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      # -----------------------------
      # 7. Install yq
      # -----------------------------
      - name: Install yq
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      # -----------------------------
      # 8. Update deployment image
      # -----------------------------
      - name: Update GitOps manifest
        run: |
          cd gitops

          yq -i '.spec.template.spec.containers[0].image = strenv(IMAGE_NAME) + ":" + strenv(SHORT_SHA)' k8s/deployment.yaml

      # -----------------------------
      # 9. Commit & push changes
      # -----------------------------
      - name: Commit and push changes
        run: |
          cd gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update image to $SHORT_SHA"
          git push